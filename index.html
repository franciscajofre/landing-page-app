<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MusicWave</title>
</head>
<body>

    <h1>Registro - MusicWave</h1>

    <form action="PONER_AQUI_TU_LINK_DE_FORMSPREE" method="POST">

        <label for="nombre">Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre"
        placeholder="Ingrese su nombre completo"
        autocomplete="name"
        required><br><br>

        <label for="email">Correo electrónico:</label><br>
        <input type="email" id="email" name="email"
        placeholder="ejemplo@gmail.com"
        autocomplete="email"
        required><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" name="password"
        minlength="8"
        autocomplete="new-password"
        required><br><br>

        <label for="edad">Edad:</label><br>
        <input type="number" id="edad" name="edad"
        min="13"
        max="100"
        required><br><br>

        <label for="fecha">Fecha de nacimiento:</label><br>
        <input type="date" id="fecha" name="fecha"
        required><br><br>

        <label for="usuario">Nombre de usuario:</label><br>
        <input type="text"
        id="usuario"
        name="usuario"
        pattern="[A-Za-z0-9]{5,12}"
        placeholder="Ej: Fran123"
        required><br><br>

        <label for="pais">País:</label><br>
        <select id="pais" name="pais" required>
            <option value="">Seleccione</option>
            <option>Argentina</option>
            <option>Brasil</option>
            <option>Chile</option>
            <option>Uruguay</option>
        </select><br><br>

        <label for="ciudad">Ciudad de residencia:</label><br>
        <input list="ciudades" id="ciudad" name="ciudad" required>

        <datalist id="ciudades">
            <option value="Buenos Aires">
            <option value="Córdoba">
            <option value="Rosario">
            <option value="Mendoza">
            <option value="La Plata">
        </datalist>

        <br><br>

        <label>Género:</label><br>

        <input type="radio" id="fem" name="genero" value="Femenino">
        <label for="fem">Femenino</label>

        <input type="radio" id="masc" name="genero" value="Masculino">
        <label for="masc">Masculino</label>

        <input type="radio" id="otro" name="genero" value="Otro">
        <label for="otro">Otro</label>

        <br><br>

        <label>Intereses:</label><br>

        <input type="checkbox" id="rock" name="intereses" value="Rock">
        <label for="rock">Rock</label>

        <input type="checkbox" id="pop" name="intereses" value="Pop">
        <label for="pop">Pop</label>

        <input type="checkbox" id="trap" name="intereses" value="Trap">
        <label for="trap">Trap</label>

        <br><br>

        <label for="bio">Biografía corta:</label><br>
        <textarea
        id="bio"
        name="bio"
        maxlength="200"
        placeholder="Contanos un poco sobre vos"></textarea>

        <br><br>

        <button type="submit">Registrarse</button>

    </form>

    <hr>

    <section>

        <h2>Contacto con Soporte</h2>

        <form action="PONER_AQUI_TU_LINK_DE_FORMSPREE" method="POST">

            <label for="nombre2">Nombre:</label><br>
            <input type="text"
            id="nombre2"
            name="nombre"
            required><br><br>

            <label for="email2">Email:</label><br>
            <input type="email"
            id="email2"
            name="email"
            required><br><br>

            <label for="motivo">Motivo de contacto:</label><br>

            <select id="motivo" name="motivo" required>
                <option value="">Seleccione</option>
                <option>Consulta</option>
                <option>Soporte técnico</option>
                <option>Reclamo</option>
            </select>

            <br><br>

            <label for="mensaje">Mensaje:</label><br>

            <textarea
            id="mensaje"
            name="mensaje"
            minlength="10"
            maxlength="500"
            required></textarea>

            <br><br>

            <input type="checkbox"
            id="acepto"
            name="acepto"
            required>

            <label for="acepto">
                Acepto los términos y condiciones
            </label>

            <br><br>

            <button type="submit">
                Enviar
            </button>

        </form>

    </section>

</body>
</html>
